<!DOCTYPE html>
<html>
<head>
  <title>My Portfolio</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0f172a, #020617);
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    .box {
      background: rgba(255, 255, 255, 0.05);
      padding: 30 px 40 px;
      border-radius: 12 px;
      box-shadow: 0 0 20 px rgba(0,0,0,0.5);
    }

    h1 {
      margin-bottom: 15 px;
    }

    p {
      color: #94a3b8;
    }

    a {
      display: inline-block;
      margin: 15 px 0;
      color: #38bdf8;
      text-decoration: none;
      font-weight: bold;
    }

    a:hover {
      color: white;
    }
  </style>

</head>

<body>

  <div class="box">
    <h1>Hello, this is my webpage.................</h1>

    <a href="frontpage.html">Click here to view my portfolio webpage</a>

    <p>This is a small insight to myself and my interests</p>
  </div>

</body>
</html>
